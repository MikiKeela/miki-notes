<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#CC2936">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Miki Notes">
<meta name="description" content="Miki's IT & Networking Notes">
<title>Miki Notes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0E14;color:#E2E8F0;min-height:100vh;overscroll-behavior:none}

  #header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#0a0a14,#12121e 50%,#0a0a14);border-bottom:1px solid #CC2936;padding:12px 12px 10px}
  .header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .badge{background:#CC2936;border-radius:5px;padding:3px 9px;font-size:11px;font-family:monospace;font-weight:700;letter-spacing:0.5px;color:#fff}
  h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .ver{margin-left:auto;font-size:10px;color:#334155;font-family:monospace}

  #search{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #2A2A3A;background:#1A1A28;color:#E2E8F0;font-size:14px;outline:none;font-family:inherit}
  #search::placeholder{color:#475569}
  #search:focus{border-color:#CC2936}

  #cats{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .cat-btn{padding:3px 9px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#1E1E30;color:#64748B;transition:all .15s;font-family:inherit}
  .cat-btn.active{color:#fff}

  #content{padding:12px 10px;max-width:900px;margin:0 auto;padding-bottom:30px}

  .section{margin-bottom:18px}
  .sec-header{display:flex;align-items:center;gap:7px;margin-bottom:7px;padding-bottom:5px}
  .sec-title{font-size:14px;font-weight:700;color:#F1F5F9}
  .sec-count{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}

  .items{display:grid;gap:5px}
  .item{background:#12131E;border:1px solid #1E2030;border-radius:6px;padding:9px 11px;display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:start}
  .term{font-family:monospace;font-size:11.5px;font-weight:700;word-break:break-all;line-height:1.4}
  .def{font-size:12px;color:#CBD5E1;line-height:1.5}

  .empty{text-align:center;color:#475569;padding:40px 0;font-family:monospace}
  .empty-icon{font-size:30px;margin-bottom:8px}

  #tip{margin-top:14px;padding:11px;background:#0F1824;border:1px solid #1E3A5F;border-radius:8px;font-family:monospace;font-size:11px;color:#64748B}

  @media(min-width:600px){.item{grid-template-columns:180px 1fr}.term{font-size:12.5px}.def{font-size:13px}}

  /* Subnet Calculator */
  .calc-box{background:#12131E;border:1px solid #1E2030;border-radius:10px;padding:14px;margin-bottom:12px}
  .calc-label{font-size:11px;color:#64748B;font-family:monospace;margin-bottom:5px;display:block}
  .calc-row{display:flex;gap:8px;align-items:stretch}
  .calc-input{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #2A2A3A;background:#0D0E14;color:#E2E8F0;font-size:15px;font-family:monospace;outline:none}
  .calc-input:focus{border-color:#0EA5E9}
  .calc-prefix{width:72px;padding:10px 8px;border-radius:8px;border:1px solid #2A2A3A;background:#0D0E14;color:#E2E8F0;font-size:15px;font-family:monospace;outline:none;text-align:center}
  .calc-prefix:focus{border-color:#0EA5E9}
  .calc-btn{padding:10px 18px;border-radius:8px;border:none;background:#0EA5E9;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .calc-btn:active{background:#0284C7}
  .calc-err{color:#F87171;font-size:12px;margin-top:6px;font-family:monospace}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
  .result-item{background:#0D0E14;border-radius:7px;padding:9px 10px;border-left:3px solid #0EA5E9}
  .result-item.full{grid-column:1/-1}
  .result-item.green{border-color:#22C55E}
  .result-item.red{border-color:#EF4444}
  .result-item.yellow{border-color:#EAB308}
  .result-item.purple{border-color:#A855F7}
  .r-label{font-size:10px;color:#64748B;font-family:monospace;margin-bottom:3px}
  .r-val{font-size:13px;font-weight:700;font-family:monospace;color:#E2E8F0;word-break:break-all}
  .r-bin{font-size:9px;color:#475569;font-family:monospace;margin-top:2px;word-break:break-all;line-height:1.5}
  .cheat-table{width:100%;border-collapse:collapse;font-family:monospace;font-size:11.5px;margin-top:4px}
  .cheat-table th{background:#1A1A28;color:#94A3B8;padding:6px 8px;text-align:left;font-weight:600;border-bottom:1px solid #2A2A3A}
  .cheat-table td{padding:6px 8px;border-bottom:1px solid #1E2030;color:#CBD5E1}
  .cheat-table tr:last-child td{border-bottom:none}
  .cheat-table tr:hover td{background:#1A1A28}
</style>
</head>

  <div class="header-top">
    <span class="badge">Miki</span>

  </div>

  <div id="cats"></div>
</div>

<div id="content"></div>

    {term:"Cat6a",def:"Up to 10 Gbps, 100m. 'Augmented' Cat6. Thicker, stiffer cable. Used in data centers."},
    {term:"Cat7",def:"Up to 10 Gbps, 100m. Fully shielded (S/FTP). Uses GG45 or TERA connector."},
    {term:"Cat8",def:"Up to 40 Gbps, 30m. For data centers and server rooms. Very thick and stiff."},
    {term:"UTP",def:"Unshielded Twisted Pair — most common, flexible, cheap. No shielding against interference."},
    {term:"STP",def:"Shielded Twisted Pair — foil/braid shield around pairs. Better in high-interference environments."},
    {term:"FTP",def:"Foiled Twisted Pair — foil around all pairs together. Also called F/UTP."},
    {term:"RJ45",def:"Standard 8-pin connector for Ethernet cables. Used on Cat5/5e/6/6a."},
    {term:"Straight-through",def:"Same pin order on both ends (T568B–T568B). PC → Switch, Router → Switch."},
    {term:"Crossover",def:"Crossed TX/RX pairs (T568A–T568B). PC → PC, Switch → Switch (old). Modern switches have Auto-MDI-X."},
    {term:"Auto-MDI-X",def:"Feature on modern switches/NICs that automatically detects and corrects cable type. No crossover needed."},
    {term:"T568A / T568B",def:"Two wiring standards for RJ45. T568B most common (white-orange, orange, white-green, blue, white-blue, green, white-brown, brown)."},
    {term:"Fiber optic",def:"Uses light pulses instead of electrical signals. Immune to EMI, very long distances, very fast."},
    {term:"Single-mode fiber",def:"SMF — thin core (9µm), laser light, very long distance (up to 100km+). More expensive. Yellow jacket."},
    {term:"Multi-mode fiber",def:"MMF — thicker core (50/62.5µm), LED light, shorter distance (up to ~550m at 10Gbps). Orange/aqua jacket."},
    {term:"LC connector",def:"Small form-factor fiber connector. Most common in modern equipment and SFP modules."},
    {term:"SC connector",def:"Larger push-pull fiber connector. Common in older equipment and patch panels."},
    {term:"ST connector",def:"Bayonet-style fiber connector (twist-lock). Older networks."},
    {term:"SFP",def:"Small Form-factor Pluggable — hot-swappable module for fiber or copper. 1 Gbps. Goes into SFP port."},
    {term:"SFP+",def:"Enhanced SFP — supports 10 Gbps. Common in enterprise switches and routers."},
    {term:"Coaxial",def:"Central copper wire + outer shield. Used for cable TV, internet (DOCSIS). BNC or F-type connector."},
    {term:"PoE",def:"Power over Ethernet — delivers electrical power over Cat5e/6 cable. IEEE 802.3af (15.4W) or 802.3at (30W)."},
    {term:"Max cable length",def:"Copper Ethernet (Cat5e–Cat8): 100m. After 100m signal degrades — use switch or repeater."},
    {term:"Patch cable",def:"Short, pre-made cable used to connect devices in a rack or to a patch panel. Usually Cat6."},
    {term:"Rollover cable",def:"Console cable — connects PC to Cisco/MikroTik console port (RJ45 to DB9 or USB). Used for initial setup."},
  ]},
  {id:"commands",title:"⌨️ MikroTik CLI Quick Ref",color:"#334155",items:[
    {term:"/ping x.x.x.x",def:"Ping — test connectivity to IP address"},
    {term:"/tool traceroute",def:"Traceroute — show path to destination"},
    {term:"/interface print",def:"All interfaces and their status (R=running, D=disabled)"},
    {term:"/ip address print",def:"All IP addresses on interfaces"},
    {term:"/ip route print",def:"Routing table"},
    {term:"/ip arp print",def:"ARP table — IP↔MAC mappings"},
    {term:"/ip dhcp-server lease print",def:"DHCP leases (who has which IP)"},
    {term:"/ip firewall filter print",def:"Firewall rules with counters"},
    {term:"/log print",def:"System log. Useful for troubleshooting."},
    {term:"/system resource print",def:"CPU, RAM, uptime, RouterOS version"},
    {term:"/system routerboard print",def:"Hardware info, firmware version"},
    {term:"/ip service print",def:"Active services and their ports"},
  ]},
  {id:"wifi80211",title:"📶 802.11 Wi-Fi Standards",color:"#0D9488",items:[
    {term:"802.11a",def:"5 GHz only. Up to 54 Mbps. Less interference but shorter range. Older standard."},
    {term:"802.11b",def:"2.4 GHz only. Up to 11 Mbps. Long range, lots of interference. Oldest common standard."},
    {term:"802.11g",def:"2.4 GHz only. Up to 54 Mbps. Backward compatible with 802.11b."},
    {term:"802.11n (Wi-Fi 4)",def:"2.4 GHz AND 5 GHz. Up to 600 Mbps. Uses MIMO (multiple antennas). Most common."},
    {term:"802.11ac (Wi-Fi 5)",def:"5 GHz only. Up to ~3.5 Gbps. MU-MIMO, wider channels (80/160 MHz). Very fast."},
    {term:"802.11ax (Wi-Fi 6)",def:"2.4 GHz AND 5 GHz AND 6 GHz. Up to ~9.6 Gbps. OFDMA, better in crowded areas."},
    {term:"2.4 GHz channels",def:"Channels 1–14. Each 5 MHz apart. Ch1=2412MHz, Ch2=2417MHz, Ch3=2422MHz ... Ch13=2472MHz. Non-overlapping: 1, 6, 11."},
    {term:"5 GHz channels",def:"Channels 36, 40, 44, 48... (5180MHz, 5200MHz...). More channels, less interference, shorter range."},
    {term:"b/g frequencies",def:"802.11b and g are 2.4 GHz ONLY. Frequencies like 2412, 2422, 2437, 2462 MHz. NOT 5GHz!"},
    {term:"Channel width",def:"20MHz = stable, max compatibility. 40MHz = faster (802.11n). 80MHz = very fast (802.11ac). Wider = more interference."},
    {term:"SSID",def:"Service Set Identifier — the Wi-Fi network name clients see. Max 32 characters."},
    {term:"BSSID",def:"Basic SSID — the MAC address of the AP radio. Unique per interface."},
    {term:"Virtual AP",def:"Additional SSID on the same physical radio. Allows different security profiles/PSKs on one device."},
    {term:"Radio Name",def:"MikroTik name for the wireless interface. Shown in Neighbor Discovery (MNDP) and wireless scan. Like a hostname for the radio."},
    {term:"Access List",def:"MikroTik feature to allow/deny clients by MAC or signal strength. Checked when clients connect."},
    {term:"WEP",def:"Wired Equivalent Privacy. Very old, easily cracked in minutes. Never use!"},
    {term:"WPA",def:"Wi-Fi Protected Access. Better than WEP, but still vulnerable (TKIP). Avoid if possible."},
    {term:"WPA2-PSK",def:"Current standard for home/office. Uses AES encryption. Pre-shared key (password) for all clients."},
    {term:"WPA2-EAP",def:"Enterprise mode. Each user authenticates individually via RADIUS server. More secure than PSK."},
    {term:"WPA3",def:"Newest standard. SAE replaces PSK handshake. Stronger against brute-force. Newer devices only."},
    {term:"Hidden SSID",def:"AP doesn't broadcast network name. Security by obscurity — still easily found with sniffers."},
    {term:"MIMO",def:"Multiple Input Multiple Output — multiple antennas to send/receive simultaneously. Improves speed and range."},
  ]},
  {id:"license",title:"🔑 RouterOS License Levels",color:"#7C3AED",items:[
    {term:"Level 0 (Demo)",def:"RouterOS without license. Max 24h uptime then reboots. Very limited features."},
    {term:"Level 1 (Free)",def:"Free license for CHR. Limited to 1 Mbps upload. 1 PPP tunnel. No wireless."},
    {term:"Level 3",def:"Includes all L1 features + unlimited wireless client (station) mode + more PPP tunnels. WISP client use."},
    {term:"Level 4",def:"Includes L3 + AP mode (wireless access point) + 200 PPP tunnels + EoIP, PPTP, L2TP, PPPoE server. Most common for SOHO/WISP."},
    {term:"Level 5",def:"Includes L4 + 500 PPP tunnels + RADIUS client + hotspot. For larger deployments."},
    {term:"Level 6",def:"Unlimited everything. All features. For large ISPs and enterprises. Most expensive."},
    {term:"CHR (Cloud Hosted Router)",def:"Virtual RouterOS. L1=free/1Mbps, P1=1Gbps, P10=10Gbps, PU=unlimited. Licensed by throughput."},
    {term:"E1/T1 + PPP",def:"Requires Level 4 minimum — L4 adds synchronous serial interface support and 200 PPP tunnels."},
    {term:"Wireless AP mode",def:"Requires Level 4 minimum — L3 only allows station (client) mode, not AP."},
    {term:"Hotspot",def:"Requires Level 5 or above."},
    {term:"/system license print",def:"CLI command to view current license level and features."},
  ]},
  {id:"ipservice",title:"🛡️ IP Services & Access Control",color:"#BE185D",items:[
    {term:"/ip service",def:"Manage which services are running and on which ports/addresses. Disable unused services for security!"},
    {term:"available-from",def:"Field in /ip service — restricts which IP addresses can connect to that service. Leave empty = any IP allowed."},
    {term:"Block specific IP (web)",def:"Use Firewall Filter Chain INPUT — drop rule for src-address=bad.ip dst-port=80,443 protocol=tcp"},
    {term:"Allow only your IP (web)",def:"Use /ip service set www address=192.168.1.10 — only that IP can access WebFig"},
    {term:"Chain INPUT use cases",def:"Block/allow: Winbox access, SSH, WebFig, ping to router — all traffic DESTINED FOR the router itself"},
    {term:"Chain FORWARD use cases",def:"Block/allow: traffic THROUGH the router between LAN and WAN/internet"},
    {term:"Disable Telnet",def:"/ip service disable telnet — Telnet is unencrypted, always disable it!"},
    {term:"Change default port",def:"/ip service set winbox port=9999 — change port to make scanning harder (security by obscurity)"},
    {term:"Neighbor Discovery",def:"/ip neighbor discovery — disable on WAN interfaces so router isn't visible to outside world"},
    {term:"/ip firewall connection",def:"Connection tracking table — shows all active connections through/to router"},
    {term:"Packet flow order",def:"Incoming: RAW → Prerouting (NAT) → Filter INPUT/FORWARD → Postrouting (NAT) → Outgoing"},
  ]},
  {id:"backupexport",title:"💾 Backup vs Export",color:"#475569",items:[
    {term:"Backup (.backup)",def:"Binary format — NOT human-readable, NOT editable. Includes all config + passwords. Full snapshot."},
    {term:"Export (.rsc)",def:"Plain text — human-readable, CAN be edited with any text editor. RouterOS script commands."},
    {term:"/system backup save",def:"Creates binary backup. name=mybackup → mybackup.backup file"},
    {term:"/export",def:"Full router config as text. /ip firewall export → exports only firewall section."},
    {term:"/import",def:"Runs an .rsc export file. NO reboot needed — config applies immediately!"},
    {term:"Backup is plain text?",def:"FALSE — backup is binary. Export is plain text. Very common exam trick!"},
    {term:"Reboot after import?",def:"FALSE — no reboot needed after importing .rsc file."},
    {term:"What /export excludes",def:"User passwords, logs, runtime data, scripts from /system script."},
  ]},
  {id:"queues",title:"⚡ Queues — Deep Dive",color:"#C2410C",items:[
    {term:"Queue priorities",def:"8 levels: 1 (highest) to 8 (lowest). Lower number = higher priority = sent first."},
    {term:"Highest priority",def:"1 — always served before lower priorities."},
    {term:"Lowest priority",def:"8 — served last when all higher priorities are empty."},
    {term:"Simple Queue — first match",def:"If two queues match same IP, FIRST (lowest index) queue wins. Queue 0 overrides Queue 1 for same target!"},
    {term:"Queue 'total'",def:"In RouterOS, 'total' = upload + download combined bandwidth."},
    {term:"FIFO",def:"First In First Out — simplest. Packets leave in arrival order (byte or packet based)."},
    {term:"SFQ",def:"Stochastic Fairness Queuing — divides into sub-flows, serves each fairly. Prevents starvation."},
    {term:"RED",def:"Random Early Detect/Drop — drops packets before queue is full to signal congestion."},
    {term:"PCQ",def:"Per Connection Queuing — divides bandwidth equally per client/flow. Best for shared internet."},
    {term:"PCQ download",def:"pcq-classifier=dst-address — classifies by destination (who receives = download)"},
    {term:"PCQ upload",def:"pcq-classifier=src-address — classifies by source (who sends = upload)"},
    {term:"/queue simple required",def:"target-address + max-limit are the only required fields."},
  ]},
  {id:"arp",title:"🔍 ARP & MAC Addresses",color:"#065F46",items:[
    {term:"ARP",def:"Address Resolution Protocol — resolves IP → MAC. Broadcasts on local LAN. NOT used in IPv6!"},
    {term:"ARP in IPv6?",def:"FALSE — IPv6 uses NDP (Neighbor Discovery Protocol) with ICMPv6 instead of ARP."},
    {term:"ARP reply-only",def:"Interface only replies using static entries in /ip arp. New MACs NOT learned automatically."},
    {term:"ARP request expects",def:"MAC address in return — 'who has 192.168.1.1?' → '00:11:22:33:44:55'"},
    {term:"MAC address format",def:"6 groups of 2 hex characters: AA:BB:CC:DD:EE:FF. Hex = 0-9 and A-F only. Total 48 bits."},
    {term:"Invalid MAC: 95:B5D:EE:78:8A",def:"INVALID — group B5D has 3 characters, must be exactly 2."},
    {term:"Invalid MAC: 80:GF:AA:67:13:5D",def:"INVALID — G is not a hex character."},
    {term:"Max ARP entries",def:"Default maximum is 8192 entries in RouterOS ARP table."},
    {term:"Full duplex = no collisions",def:"TRUE — full duplex has separate TX/RX channels. Collisions only happen in half-duplex (CSMA/CD)."},
    {term:"Layer 2 = MAC layer",def:"OSI Layer 2 (Data Link) is also called the MAC layer. Handles frames and hardware addresses."},
  ]},
  {id:"wireless2",title:"📡 Wireless Advanced",color:"#0E7490",items:[
    {term:"Default Authenticate",def:"When ENABLED (default) — any client can try connecting. DISABLE to restrict to Access List only."},
    {term:"Access List",def:"/interface wireless access-list — permit/deny clients by MAC address. Works when Default Authenticate=disabled."},
    {term:"Default Forward",def:"Controls whether wireless clients can talk to each other. Disable = client isolation."},
    {term:"Radio Name",def:"Name shown in the LIST OF CONNECTED CLIENTS on the AP. Useful to identify which station is which."},
    {term:"WDS mode",def:"Wireless Distribution System — two APs bridge wirelessly. Both in ap-bridge mode + WDS enabled."},
    {term:"station-bridge",def:"One device in ap-bridge, one in station-bridge. Correct way to bridge two networks wirelessly."},
    {term:"station mode + Ethernet bridge",def:"DOES NOT work properly — use station-bridge mode instead when you need to bridge to Ethernet!"},
    {term:"WPA + WPA2 same profile",def:"TRUE — a single security profile can support both WPA and WPA2 at the same time."},
    {term:"NStreme 40MHz only?",def:"FALSE — NStreme (MikroTik proprietary protocol) works on various channel widths."},
    {term:"Wireless scan-list format",def:"Valid: 5500,5700 (comma) or 5500-5700 (dash range). INVALID: space-separated."},
    {term:"100 Mbps actual throughput",def:"Need 802.11n (a/n or a/b/g/n). 802.11b/g max is 54 Mbps — cannot reach 100 Mbps!"},
  ]},
  {id:"ppp",title:"🔗 PPP & Tunnels",color:"#6D28D9",items:[
    {term:"PPPoE broadcast domain",def:"PPPoE only works within ONE Ethernet broadcast domain. Router between server and client = NO tunnel!"},
    {term:"PPP Secrets (/ppp secret)",def:"User database for PPPoE, L2TP, PPTP, PPP clients. NOT for Hotspot or Winbox/system users."},
    {term:"PPPoE client config",def:"Only needs INTERFACE specified. Static IP not required — gets it from PPPoE server."},
    {term:"PPP Secrets — can do",def:"Restrict to one login type (PPPoE only), allow/deny multiple simultaneous logins."},
    {term:"PPP Secrets — cannot do",def:"Cannot limit total transferred bytes (up+download quota) from Secrets alone."},
    {term:"PPTP client + server same router",def:"TRUE — RouterOS can run both PPTP client and PPTP server at the same time."},
    {term:"E1/T1 + PPP",def:"CANNOT be done in RouterOS — E1/T1 synchronous serial with PPP is NOT supported!"},
    {term:"Secrets shared between routers?",def:"NO — Router A cannot use /ppp secret accounts from Router B. Always local database."},
  ]},
  {id:"misc",title:"🎯 Tricky Exam Facts",color:"#991B1B",items:[
    {term:"Level 0 (Demo) duration",def:"Reboots every 24 hours. Not permanent. Use to test before buying license."},
    {term:"Level 1 (Free) duration",def:"INFINITE — never expires! But limited to 1 Mbps throughput. Common exam trick: NOT 24h!"},
    {term:"Cannot disable 'admin'",def:"TRUE — built-in 'admin' user cannot be disabled from /user menu. Can only change its password."},
    {term:"Add drivers to RouterOS?",def:"NO — cannot add custom drivers. If NIC not recognized by RouterOS, it won't work at all."},
    {term:"Static routing package",def:"NO extra package needed — static routing is built into the base 'system' package."},
    {term:"Route letters",def:"C = Connected (auto when IP added to interface), A = Active, S = Static, D = Dynamic"},
    {term:"Distance (admin distance)",def:"Lower = preferred. Distance=5 beats distance=10 for same destination 0.0.0.0/0."},
    {term:"DHCP: IP without gateway?",def:"TRUE — DHCP can give an IP without a default gateway. Gateway is optional."},
    {term:"Hotspot on wireless?",def:"YES — Hotspot works on wireless interfaces too, not only Ethernet!"},
    {term:"Public IP test",def:"Private (NOT routable): 10.x, 172.16–31.x, 192.168.x, 127.x. Everything else = public."},
    {term:"/23 usable hosts",def:"2^(32-23) − 2 = 512 − 2 = 510 hosts. Mask = 255.255.254.0"},
    {term:"Valid subnet mask rule",def:"Binary must be continuous 1s then 0s. 255.255.192.255 is INVALID (1s after 0s)."},
    {term:"action=Redirect",def:"Lives in chain=DSTNAT. Sends packet to a port on the router itself (e.g. intercept DNS on port 53)."},
    {term:"Mangle actions",def:"mark-connection, mark-packet, mark-routing, change-MSS, change-TTL, accept, jump, log, passthrough"},
    {term:"Filter actions",def:"accept, drop, reject, tarpit, fasttrack-connection, log, jump, return, add-src-to-address-list"},
    {term:"Netinstall",def:"Reinstalls RouterOS and can reset config via network boot. Does NOT save old config!"},
    {term:"/system scheduler",def:"Runs scripts at set times/intervals. Use this — /system cron does NOT exist in RouterOS!"},
    {term:"Hotspot IP Bindings",def:"Allows specific IPs/MACs to bypass Hotspot login — gets internet without authentication."},
    {term:"Winbox download from",def:"Router's own webpage (http://router-ip) OR mikrotik.com. NOT from Files menu in router."},
    {term:"Layer-3 between 2 hosts min subnet",def:"/30 = 2 usable hosts. /31 = no usable in traditional IP. /29 and above also work."},
    {term:"OSI Layer 1 unit",def:"BIT. Layer 2 = Frame. Layer 3 = Packet. Layer 4 = Segment. Layer 5-7 = Data."},
    {term:"TCP states (connection tracking)",def:"syn-sent, syn-received, established, fin-wait, close-wait, last-ack, time-wait, closed"},
    {term:"connection-state=established",def:"Packet belongs to an ALREADY EXISTING connection (reply packet or continuation). NOT new."},
  ]},
  {id:"connstates",title:"🔗 Connection States & Firewall Logic",color:"#1E3A5F",items:[
    {term:"new",def:"First packet of a brand new connection. Not yet in connection tracking table."},
    {term:"established",def:"Packet belongs to an existing, already-replied connection. Both directions have sent packets."},
    {term:"related",def:"New connection related to an existing one (e.g. FTP data channel opened by FTP control). Separate connection."},
    {term:"invalid",def:"Packet doesn't match any known connection and isn't starting a new one. Always DROP these."},
    {term:"Valid RouterOS conn states",def:"new, established, related, invalid. States like 'syn' and 'closed' are TCP-level, NOT RouterOS connection tracking states!"},
    {term:"Related NOT caught by established/invalid",def:"TRUE — if you have rules for 'established' and 'invalid' only, 'related' packets pass through UNMATCHED. Add related rule too!"},
    {term:"Recommended firewall order",def:"1) accept established,related → 2) drop invalid → 3) your specific rules → 4) drop all (input chain)"},
    {term:"Connection tracking required for",def:"NAT (masquerade, dstnat) AND stateful firewall. Must be ENABLED for these to work."},
    {term:"TCP connection tracking states",def:"syn-sent, syn-received, established, fin-wait, close-wait, last-ack, time-wait — these are TCP states visible in /ip firewall connection"},
    {term:"action=Redirect use cases",def:"Transparent DNS cache (port 53), Transparent HTTP proxy (port 80). Forces all traffic to router's own service."},
  ]},
  {id:"packages",title:"📦 RouterOS Packages & Hardware",color:"#3B5323",items:[
    {term:"system package",def:"Base package — always installed. Includes: IP routing, firewall, bridge, basic wireless, DHCP, PPP, NTP, SSH, Telnet, basic ping/traceroute."},
    {term:"advanced-tools package",def:"Adds: bandwidth-test, ip-scan, netwatch, wake-on-lan, traffic-generator, ping-speed. Remove to save resources."},
    {term:"wireless package",def:"Full wireless support (AP, station, WDS, etc). Some boards have it built-in."},
    {term:"routing package",def:"Dynamic routing protocols: OSPF, BGP, RIP, MPLS. NOT needed for static routes!"},
    {term:"dhcp package",def:"DHCP server and client. Some versions have this in system package."},
    {term:"Netwatch",def:"Monitors hosts — sends notifications when host goes up/down. Lives in advanced-tools."},
    {term:"Bandwidth-test",def:"Tests throughput between two RouterOS devices. Lives in advanced-tools."},
    {term:"ip-scan",def:"Scans IP range for active hosts. Lives in advanced-tools."},
    {term:"RouterBOARD baud rate",def:"Default serial console baud rate on all current RouterBOARDs = 115200 baud, 8N1."},
    {term:"Lost password fix",def:"TRUE — if router login password is lost, you must either reinstall RouterOS OR use the hardware reset button."},
    {term:"Hardware reset",def:"Physical button on RouterBOARD — hold during boot to reset config. Wipes configuration but keeps RouterOS."},
    {term:"Netinstall",def:"Boot from network to reinstall RouterOS. Can also reset config. Useful when device is unresponsive."},
    {term:"Admin cannot be deleted",def:"TRUE — the 'admin' user cannot be deleted OR disabled from /user menu. Add a new admin and change admin password instead."},
  ]},
  {id:"architecture",title:"🖥️ RouterBOARD Architectures",color:"#4A3728",items:[
    {term:"mipsbe",def:"MIPS Big Endian — used in: RB433, RB133, RB750, RB951 and many older boards. Most common MikroTik architecture."},
    {term:"mipsle",def:"MIPS Little Endian — used in some older boards (e.g. RB100 series). Different from mipsbe — NOT interchangeable!"},
    {term:"powerpc",def:"Used in: RB1100, RB600, RB800 series. High-performance older boards."},
    {term:"x86",def:"Standard PC architecture. RouterOS for x86 runs on regular PCs, VMs, CHR."},
    {term:"arm",def:"Used in: RB3011, hAP ac², hAP ac³, RB4011. Modern, energy-efficient."},
    {term:"arm64",def:"64-bit ARM — used in newest MikroTik devices (CCR2004, RB5009)."},
    {term:"tile",def:"Tilera architecture — used in CCR (Cloud Core Router) series for very high throughput."},
    {term:"Wrong arch = won't install",def:"Installing mipsbe package on a powerpc board = FAILS. Must match the board's architecture exactly."},
    {term:"RB1100 architecture",def:"PowerPC — must use routeros-powerpc-x.xx.npk"},
    {term:"RB133 architecture",def:"MIPSBE — must use routeros-mipsbe-x.xx.npk"},
    {term:"RB433 architecture",def:"MIPSBE — must use routeros-mipsbe-x.xx.npk"},
    {term:"RB333 architecture",def:"MIPSBE (not PowerPC!) — must use routeros-mipsbe-x.xx.npk"},
  ]},
  {id:"miscq",title:"📝 More Exam Q&A",color:"#7F1D1D",items:[
    {term:"IP pool from multiple subnets?",def:"TRUE — a single IP pool in RouterOS can contain ranges from more than one subnet. e.g. 10.0.0.1-10.0.0.100 and 192.168.1.1-192.168.1.50"},
    {term:"Client PC on router LAN",def:"Client must be in the SAME subnet as the router's LAN interface. If router LAN = 192.168.2.1/24, client needs 192.168.2.x/24 and gateway 192.168.2.1"},
    {term:"Rate flapping",def:"When wireless link constantly switches between data rates (signal instability). Causes poor performance."},
    {term:"Rate flapping fix",def:"Set basic-rates to ONE fixed rate (e.g. 24 Mbps). Forces stable rate instead of constantly changing."},
    {term:"RED not functional on UDP",def:"RED (Random Early Detect) works by dropping packets to signal congestion — TCP responds by slowing down. UDP ignores drops so RED has no effect on UDP traffic."},
    {term:"Queue type for congestion + TCP only",def:"RED — signals congestion by dropping before queue is full, but only TCP responds. Not useful for UDP (gaming, VoIP)."},
    {term:"Mangle cannot DROP",def:"IMPORTANT — /ip firewall mangle does NOT have a 'drop' action! Use filter chain for dropping. Mangle only marks, changes headers, or accepts."},
    {term:"DHCP distributes IPs via",def:"DHCP protocol (Dynamic Host Configuration Protocol). NOT HTTP, FTP, or SNMP."},
    {term:"IP pool can span subnets",def:"TRUE — /ip pool add ranges=192.168.1.10-192.168.1.50,10.0.0.1-10.0.0.20 is valid."},
    {term:"Which software on RB1100?",def:"routeros-powerpc-x.xx.npk (PowerPC arch). NOT x86, NOT mipsbe."},
    {term:"Which software on RB133/RB433?",def:"routeros-mipsbe-x.xx.npk. NOT mipsle, NOT powerpc."},
    {term:"Advanced-tools removed features",def:"ip-scan, netwatch, bandwidth-test, wake-on-lan. Ping and neighbors remain (they're in system package)."},
    {term:"Forward chain — related traffic",def:"A rule for 'established' does NOT catch 'related' — they are different states. Must explicitly accept both."},
    {term:"Protecting Winbox externally",def:"Drop in INPUT chain from external (WAN) interface. NOT forward chain (that's for through-traffic)."},
  ]},
  {id:"rosbasics",title:"⚙️ RouterOS Essentials",color:"#166534",items:[
    {term:"Default LAN IP",def:"192.168.88.1/24 — factory default on SOHO RouterBOARDs. DHCP server runs on LAN, DHCP client on ether1 (WAN)."},
    {term:"Default login",def:"Username: admin | Password: (blank/empty). Always change password immediately!"},
    {term:"RouterOS on PC / VM",def:"RouterOS can be installed on regular x86 PC or run as a virtual machine (VMware, VirtualBox, Hyper-V, etc.)."},
    {term:"RouterOS kernel",def:"Based on Linux kernel — but NOT a standard Linux distro. Has its own CLI and package system."},
    {term:"Bugfix release",def:"Only bug fixes, no new features. Most stable. Recommended for production."},
    {term:"Current release",def:"Bug fixes + new features. Stable enough for most use. Default update channel."},
    {term:"Release Candidate (RC)",def:"Pre-release testing version. May have new bugs. Only for testing, not production."},
    {term:"Upgrade methods",def:"1) Drag .npk file into Winbox window 2) WebFig → Files 3) FTP upload 4) /system package update"},

let activeCat = "all";

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const content = document.getElementById("content");

  const filtered = DATA
    .filter(cat => activeCat === "all" || cat.id === activeCat)
    .map(cat => ({
      ...cat,
      items: cat.items.filter(item =>
        item.term.toLowerCase().includes(q) || item.def.toLowerCase().includes(q)
      )
    }))
    .filter(cat => cat.items.length > 0);

  if (!filtered.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">¯\\_(ツ)_/¯</div><div>No results for: "${q}"</div></div>`;
    return;
  }

  content.innerHTML = filtered.map(cat => `
    <div class="section">
      <div class="sec-header" style="border-bottom:2px solid ${cat.color}">
        <span class="sec-title">${cat.title}</span>
        <span class="sec-count" style="background:${cat.color}33;color:${cat.color === '#1A1A2E' ? '#7DD3FC' : cat.color}">${cat.items.length} terms</span>
      </div>
      <div class="items">
        ${cat.items.map(item => `
          <div class="item" style="border-left:3px solid ${cat.color}">
            <div class="term" style="color:${['#1A1A2E','#334155'].includes(cat.color) ? '#7DD3FC' : cat.color};filter:brightness(1.25)">${item.term}</div>
            <div class="def">${item.def}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("") + `<div id="tip"><span style="color:#7DD3FC">[TIP]</span> In MikroTik CLI, type <span style="color:#A3E635">?</span> at any level to see available commands and parameters.</div>`;
}

function buildCats() {
  const cats = document.getElementById("cats");
  cats.innerHTML = `<button class="cat-btn active" style="background:#CC2936;color:#fff" onclick="setCat('all',this)">All</button>` +
    DATA.map(cat => `<button class="cat-btn" onclick="setCat('${cat.id}',this)">${cat.title.split(" ").slice(1).join(" ")}</button>`).join("") +
    `<button class="cat-btn" onclick="setCat('calc',this)">🧮 Subnet Calc</button>`;
}

function setCat(id, btn) {
  activeCat = id;
  document.getElementById("search").style.display = id === "calc" ? "none" : "";
  document.querySelectorAll(".cat-btn").forEach(b => {
    b.classList.remove("active");
    b.style.background = "#1E1E30";
    b.style.color = "#64748B";
  });
  btn.classList.add("active");
  if (id === "calc") {
    btn.style.background = "#0EA5E9";
    btn.style.color = "#fff";
    showCalc();
    return;
  }
  const cat = DATA.find(c => c.id === id);
  btn.style.background = id === "all" ? "#CC2936" : cat.color;
  btn.style.color = "#fff";
  render();
}

  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="calc-box">
      <span class="calc-label">IP ADDRESS + PREFIX (e.g. 192.168.1.50/24)</span>
      <div class="calc-row">
        <input class="calc-input" id="ci" placeholder="192.168.1.50" oninput="autoCalc()" onkeydown="if(event.key==='Enter')calcSubnet()">
        <input class="calc-prefix" id="cp" type="number" min="0" max="32" value="24" oninput="autoCalc()">
        <button class="calc-btn" onclick="calcSubnet()">Calc</button>
      </div>
      <div id="calc-err" class="calc-err" style="display:none"></div>
    </div>
    <div id="calc-result"></div>
    <div class="calc-box" style="margin-top:8px">

        <tr><td>/26</td><td>255.255.255.192</td><td>62</td><td>Quarter of /24</td></tr>
        <tr><td>/27</td><td>255.255.255.224</td><td>30</td><td>Small office</td></tr>
        <tr><td>/28</td><td>255.255.255.240</td><td>14</td><td>Small segment</td></tr>

        <tr><td>/30</td><td>255.255.255.252</td><td>2</td><td>Point-to-point link</td></tr>
        <tr><td>/31</td><td>255.255.255.254</td><td>2*</td><td>P2P (RFC 3021, no bcast)</td></tr>

function intToIP(n) {
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join(".");
}
function intToBin(n) {
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255]
    .map(b=>b.toString(2).padStart(8,"0")).join(".");
}
function highlight(bin, prefix) {
  if (prefix <= 0) return `<span style="color:#EF4444">${bin}</span>`;
  if (prefix >= 32) return `<span style="color:#22C55E">${bin}</span>`;
  const net = bin.replace(/\./g,"").slice(0,prefix);
  const host = bin.replace(/\./g,"").slice(prefix);
  const reinsert = s => s.match(/.{1,8}/g).join(".");
  return `<span style="color:#38BDF8">${reinsert(net.padEnd(prefix,""))}</span>.<span style="color:#FB923C">${reinsert(host)}</span>`.replace("..",".");
}

let calcTimer;
function autoCalc() { clearTimeout(calcTimer); calcTimer = setTimeout(calcSubnet, 400); }

function calcSubnet() {
  const rawIP = document.getElementById("ci").value.trim();
  let ip = rawIP, prefix;
  if (rawIP.includes("/")) {
    [ip, prefix] = rawIP.split("/");
    prefix = parseInt(prefix);
    document.getElementById("cp").value = prefix;
  } else {
    prefix = parseInt(document.getElementById("cp").value);
  }
  const errEl = document.getElementById("calc-err");
  const resEl = document.getElementById("calc-result");
  if (!ip) { resEl.innerHTML=""; errEl.style.display="none"; return; }
  const parts = ip.split(".");
  if (parts.length !== 4 || parts.some(p => isNaN(p)||p===""||+p<0||+p>255)) {
    errEl.textContent="⚠ Invalid IP address"; errEl.style.display="block"; resEl.innerHTML=""; return;
  }
  if (isNaN(prefix)||prefix<0||prefix>32) {
    errEl.textContent="⚠ Prefix must be 0–32"; errEl.style.display="block"; resEl.innerHTML=""; return;
  }
  errEl.style.display="none";
  const ipInt = parts.reduce((a,b)=>(a<<8)|+b,0)>>>0;
  const maskInt = prefix===0 ? 0 : (0xFFFFFFFF<<(32-prefix))>>>0;
  const wildInt = (~maskInt)>>>0;
  const netInt = (ipInt & maskInt)>>>0;
  const bcastInt = (netInt | wildInt)>>>0;
  const firstInt = prefix<31 ? netInt+1 : netInt;
  const lastInt = prefix<31 ? bcastInt-1 : bcastInt;
  const hosts = prefix>=32 ? 1 : prefix===31 ? 2 : Math.pow(2,32-prefix)-2;
  const f = intToIP, b = intToBin;
  const fo = intToIP(ipInt); const isIPinNet = (ipInt>=netInt && ipInt<=bcastInt);
  const fOct = (ipInt>>>24)&255;
  const cls = fOct<128?"A":fOct<192?"B":fOct<224?"C":fOct<240?"D – Multicast":"E – Reserved";
  const isPriv = fOct===10||(fOct===172&&((ipInt>>>16)&255)>=16&&((ipInt>>>16)&255)<=31)||(fOct===192&&((ipInt>>>16)&255)===168);
  const isLoopback = fOct===127;
  const isAPIPА = fOct===169&&((ipInt>>>16)&255)===254;
  const typeLabel = isLoopback?"🔁 Loopback":isAPIPА?"⚠️ APIPA (no DHCP!)":isPriv?"🔒 Private":"🌍 Public";

  resEl.innerHTML = `
    <div class="calc-box">
      <div class="result-grid">
        <div class="result-item full" style="border-color:#6366F1">
          <div class="r-label">INPUT IP</div>
          <div class="r-val">${f(ipInt)} /${prefix} &nbsp;<span style="font-size:11px;background:#6366F133;color:#A5B4FC;padding:2px 7px;border-radius:4px">${typeLabel}</span></div>
          <div class="r-bin">${highlight(b(ipInt),prefix)}</div>
        </div>
        <div class="result-item">
          <div class="r-label">NETWORK ADDRESS</div>
          <div class="r-val">${f(netInt)}</div>
          <div class="r-bin">${b(netInt)}</div>
        </div>
        <div class="result-item red">
          <div class="r-label">BROADCAST</div>
          <div class="r-val">${f(bcastInt)}</div>
          <div class="r-bin">${b(bcastInt)}</div>
        </div>
        <div class="result-item green">
          <div class="r-label">FIRST HOST</div>
          <div class="r-val">${f(firstInt)}</div>
        </div>
        <div class="result-item green">
          <div class="r-label">LAST HOST</div>
          <div class="r-val">${f(lastInt)}</div>
        </div>
        <div class="result-item">
          <div class="r-label">SUBNET MASK</div>
          <div class="r-val">${f(maskInt)}</div>
          <div class="r-bin">${b(maskInt)}</div>
        </div>
        <div class="result-item yellow">
          <div class="r-label">WILDCARD MASK</div>
          <div class="r-val">${f(wildInt)}</div>
          <div class="r-bin">${b(wildInt)}</div>
        </div>
        <div class="result-item purple">
          <div class="r-label">USABLE HOSTS</div>
          <div class="r-val">${hosts.toLocaleString()}</div>
        </div>
        <div class="result-item">
          <div class="r-label">IP CLASS</div>
          <div class="r-val">${cls}</div>
        </div>
        <div class="result-item full" style="border-color:#334155">
          <div class="r-label">HOST RANGE</div>
          <div class="r-val">${f(firstInt)} – ${f(lastInt)}</div>
        </div>
      </div>
    </div>`;
}

  const blob = new Blob([swCode], {type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
