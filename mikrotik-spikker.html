<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#CC2936">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MikroTik">
<meta name="description" content="MikroTik RouterOS eksami spikker">
<title>MikroTik Spikker</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22MikroTik%20Spikker%22%2C%22short_name%22%3A%22MikroTik%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%220D0E14%22%2C%22theme_color%22%3A%22CC2936%22%7D">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0E14;color:#E2E8F0;min-height:100vh;overscroll-behavior:none}
  
  #header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#1a0000,#2d0505 50%,#1a0a00);border-bottom:1px solid #CC2936;padding:12px 12px 10px}
  .header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .badge{background:#CC2936;border-radius:5px;padding:3px 8px;font-size:10px;font-family:monospace;font-weight:700;letter-spacing:1px;color:#fff}
  h1{font-size:16px;font-weight:700;color:#fff}
  .ver{margin-left:auto;font-size:10px;color:#475569;font-family:monospace}
  
  #search{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #2A2A3A;background:#1A1A28;color:#E2E8F0;font-size:14px;outline:none;font-family:inherit}
  #search::placeholder{color:#475569}
  
  #cats{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .cat-btn{padding:3px 9px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#1E1E30;color:#64748B;transition:all .15s;font-family:inherit}
  .cat-btn.active{color:#fff}
  
  #content{padding:12px 10px;max-width:900px;margin:0 auto}
  
  .section{margin-bottom:18px}
  .sec-header{display:flex;align-items:center;gap:7px;margin-bottom:7px;padding-bottom:5px}
  .sec-title{font-size:14px;font-weight:700;color:#F1F5F9}
  .sec-count{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
  
  .items{display:grid;gap:5px}
  .item{background:#12131E;border:1px solid #1E2030;border-radius:6px;padding:9px 11px;display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:start;cursor:pointer;transition:background .1s}
  .item:active{background:#1A1A2E}
  .term{font-family:monospace;font-size:11.5px;font-weight:700;word-break:break-all;line-height:1.4;filter:brightness(1.3)}
  .def{font-size:12px;color:#CBD5E1;line-height:1.5}
  
  .empty{text-align:center;color:#475569;padding:40px 0;font-family:monospace}
  .empty-icon{font-size:30px;margin-bottom:8px}
  
  #tip{margin-top:14px;padding:11px;background:#0F1824;border:1px solid #1E3A5F;border-radius:8px;font-family:monospace;font-size:11px;color:#64748B}
  
  #install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:#1A0A00;border-top:1px solid #CC2936;padding:12px 14px;z-index:20;align-items:center;gap:10px}
  #install-banner.show{display:flex}
  #install-btn{background:#CC2936;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  #install-close{background:none;border:none;color:#64748B;font-size:18px;cursor:pointer;padding:0 4px;margin-left:auto}
  .install-text{font-size:12px;color:#94A3B8;line-height:1.4}

  @media(min-width:600px){.item{grid-template-columns:180px 1fr}.term{font-size:12.5px}.def{font-size:13px}}
</style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <span class="badge">MikroTik</span>
    <h1>Eksami Spikker</h1>
    <span class="ver">RouterOS</span>
  </div>
  <input id="search" type="search" placeholder="🔍  Otsi terminit..." oninput="render()">
  <div id="cats"></div>
</div>

<div id="content"></div>

<div id="install-banner">
  <div class="install-text">Lisa avaekraanile – töötab ka offline!</div>
  <button id="install-btn" onclick="installApp()">📲 Lisa äpp</button>
  <button id="install-close" onclick="hideBanner()">✕</button>
</div>

<script>
const DATA = [
  {id:"access",title:"🖥️ Haldus & Juurdepääs",color:"#CC2936",items:[
    {term:"Winbox",def:"GUI haldusprogramm Windows/Linux jaoks. Ühendub MAC-aadressiga (ei vaja IP-d) või IP kaudu. Port 8291."},
    {term:"WebFig",def:"Veebipõhine haldusliides brauseris. HTTP port 80, HTTPS port 443."},
    {term:"CLI / Terminal",def:"Käsurearida – SSH (port 22) või Telnet (port 23) kaudu. Kõige võimsam haldusviis."},
    {term:"API",def:"Programmeerimisliides automaatikaks. Port 8728 (plaintext), 8729 (SSL)."},
    {term:"/system identity",def:"Routeri nimi. set name=MyRouter"},
    {term:"Safe Mode",def:"Ctrl+X – kui ühendus katkeb, taastab eelmised seaded automaatselt. Kasulik kaugsessioonidel."},
    {term:"New Terminal",def:"Winboxis saad avada CLI terminali: New Terminal"},
    {term:"/user",def:"Kasutajate haldus. Vaikimisi: admin (tühi parool). Lisa alati parool!"},
  ]},
  {id:"ip",title:"🌐 IP Aadressimine",color:"#0077B6",items:[
    {term:"/ip address",def:"IP aadresside haldus liidestel. add address=192.168.1.1/24 interface=ether1"},
    {term:"CIDR notatsioon",def:"/24 = 255.255.255.0 | /16 = 255.255.0.0 | /8 = 255.0.0.0 | /30 = point-to-point"},
    {term:"/ip route",def:"Marsruutimistabel. Vaikemarsruut: add dst-address=0.0.0.0/0 gateway=x.x.x.x"},
    {term:"Default route",def:"0.0.0.0/0 – kõik liiklus mis ei sobi teistega, läheb siia (gateway)"},

    {term:"/ip neighbor",def:"Näitab naaberseadmeid (MikroTik Neighbor Discovery – MNDP)"},
    {term:"Loopback",def:"127.0.0.1 – kohalik silmus, alati üleval"},
  ]},
  {id:"dhcp",title:"📋 DHCP",color:"#2D6A4F",items:[
    {term:"DHCP Server",def:"Jagab IP aadresse klientidele automaatselt. /ip dhcp-server"},
    {term:"DHCP Client",def:"Router ise saab ISP-lt IP aadressi. add interface=ether1 disabled=no"},
    {term:"IP Pool",def:"IP aadresside vahemik DHCP jagamiseks. ranges=192.168.1.100-192.168.1.200"},
    {term:"Lease",def:"Renditud IP aadress kliendile. Lease time = kui kaua kehtib."},

  {id:"nat",title:"🔁 NAT",color:"#E07B39",items:[
    {term:"NAT",def:"Network Address Translation – muudab IP aadresse pakettides. Lubab LAN-il internetti pääseda."},
    {term:"srcnat",def:"Source NAT – muudab lähte-IP-d. LAN → Internet. Ahel: srcnat."},
    {term:"dstnat",def:"Destination NAT – muudab siht-IP-d. Port forwarding. Ahel: dstnat."},
    {term:"Masquerade",def:"Lihtne srcnat, kasutab automaatselt väljuva liidese IP-d. Hea dünaamilise IP korral."},
    {term:"src-address",def:"Lähte-IP aadress NAT/tulemüüri reeglis"},
    {term:"out-interface",def:"Väljuv liides NAT reeglis (tavaliselt WAN/ether1)"},
    {term:"to-addresses",def:"NAT sihtkoha aadress (dstnat: sisevõrgu server)"},
    {term:"to-ports",def:"Port mida kasutatakse dstnat puhul (port forwarding)"},
  ]},
  {id:"firewall",title:"🔥 Firewall",color:"#9B2335",items:[
    {term:"/ip firewall filter",def:"Tulemüüri filtreerimisreeglid. Kolm ahelat: input, output, forward."},
    {term:"Chain: input",def:"Liiklus ROUTERISSE ENDALE suunatud (nt SSH, Winbox, ping routerile)"},
    {term:"Chain: output",def:"Liiklus ROUTERIST VÄLJA (routeri enda genereeritud)"},
    {term:"Chain: forward",def:"Liiklus LÄBI ROUTERI (LAN ↔ Internet)"},
    {term:"accept",def:"Luba pakett läbi"},
    {term:"drop",def:"Blokeeri pakett – saatjale vastust ei saadeta"},
    {term:"reject",def:"Blokeeri pakett – saatjale saadetakse ICMP vastus"},
    {term:"log",def:"Logib paketi, aga ei blokeeri ega luba"},
    {term:"established",def:"Juba loodud ühenduse paketid – lubada alati"},
    {term:"related",def:"Ühendusega seotud paketid (nt FTP andmekanalid)"},

    {term:"invalid",def:"Vigased/tundmatud paketid – blokeeri alati"},

    {term:"protocol",def:"tcp / udp / icmp / ospf jne"},

  {id:"bridge",title:"🔀 Bridge & VLAN",color:"#5E548E",items:[
    {term:"Bridge",def:"Ühendab mitu liidest Layer 2 tasemel – töötab nagu switch. /interface bridge"},
    {term:"Bridge port",def:"Liidesed mis kuuluvad bridge'i. add bridge=bridge1 interface=ether2"},

    {term:"Untagged (access)",def:"Ilma VLAN sildita – switch-seade ühendustel (nt PC)"},

    {term:"/interface wireless",def:"WiFi liideste haldus. Vaikimisi wlan1."},
    {term:"SSID",def:"Võrgu nimi (Service Set Identifier) – see mida näed WiFi nimekirjas"},
    {term:"Mode: ap-bridge",def:"Access Point režiim – jagab WiFi võrku (kõige tavalisem)"},

    {term:"Mode: bridge",def:"Punkt-punkt ühendus kahe MikroTiku vahel"},
    {term:"Band",def:"2.4GHz (pikk ulatus, aeglasem) vs 5GHz (lühem ulatus, kiirem)"},
    {term:"Security profile",def:"WPA2 turvaseaded. /interface wireless security-profiles"},
    {term:"WPA2-PSK",def:"WiFi turvalisus parooliga – praegune standard"},
    {term:"Channel width",def:"20MHz (stabiilne) vs 40/80MHz (kiirem, rohkem häireid)"},
    {term:"Frequency",def:"Konkreetne sagedus/kanal (nt 2412 = kanal 1, 5180 = kanal 36)"},
  ]},
  {id:"routing",title:"🗺️ Marsruutimine",color:"#3A6186",items:[
    {term:"Static route",def:"Käsitsi lisatud marsruut. Lihtsam, aga ei kohane muutustega automaatselt."},
    {term:"Dynamic routing",def:"Protokollid mis õpivad marsruute automaatselt: OSPF, BGP, RIP"},
    {term:"OSPF",def:"Open Shortest Path First – siseruutimine, link-state algoritm"},
    {term:"BGP",def:"Border Gateway Protocol – internetimarsruutimine, ISP-de vahel"},
    {term:"RIP",def:"Routing Information Protocol – vanem, hop count meetrika (max 15 hüpet)"},
    {term:"Admin Distance",def:"Eelistus protokollide vahel. Väiksem = eelistatavam. Static=1, OSPF=110, BGP=200"},
    {term:"Metric",def:"Marsruudi 'kulu' – väiksem on parem"},
    {term:"Next-hop",def:"Järgmine ruuter kuhu pakett saadetakse"},
  ]},
  {id:"vpn",title:"🔒 VPN & Tunnelid",color:"#7B5E3A",items:[
    {term:"PPPoE",def:"Point-to-Point Protocol over Ethernet – xDSL internetiühendus. /interface pppoe-client"},
    {term:"L2TP",def:"Layer 2 Tunneling Protocol – VPN, sageli koos IPSec-iga"},
    {term:"SSTP",def:"Secure Socket Tunneling Protocol – Microsofti VPN, töötab HTTPS pordil 443"},
    {term:"OpenVPN",def:"Avatud lähtekoodiga VPN. Port tavaliselt 1194 UDP."},
    {term:"IPSec",def:"Krüpteerib ja autentib IP pakette. Sageli L2TP kaaslane."},
    {term:"GRE Tunnel",def:"Generic Routing Encapsulation – kapseldab protokolle, ise ei krüpteeri"},
    {term:"EoIP",def:"Ethernet over IP – MikroTiku oma tunnel, ühendab ethernet-segmente üle IP"},
  ]},
  {id:"qos",title:"⚡ QoS & Ribalaius",color:"#B5451B",items:[
    {term:"/queue simple",def:"Lihtne ribalaiuse piiramine. add target=192.168.1.10 max-limit=10M/2M"},
    {term:"/queue tree",def:"Keeruline järjekord koos mangle reeglitega – täpsem kontroll"},
    {term:"max-limit",def:"Maksimaalne ribalaius (download/upload). Nt 10M/2M = 10Mbit alla, 2Mbit üles"},
    {term:"burst-limit",def:"Ajutine kiiruse tõus lühiajaliselt üle max-limit"},
    {term:"Mangle",def:"/ip firewall mangle – märgib pakette (mark) QoS jaoks"},
    {term:"PCQ",def:"Per Connection Queue – jagab ribalaiuse võrdselt kasutajate vahel"},
    {term:"priority",def:"Paketi prioriteet 1-8 (1=kõrgeim). Kõrge prioriteet = esimesena saadetud"},
  ]},
  {id:"dns",title:"📡 DNS & Süsteem",color:"#0A7E8C",items:[
    {term:"/ip dns",def:"DNS seaded. set servers=8.8.8.8,1.1.1.1 allow-remote-requests=yes"},
    {term:"allow-remote-requests",def:"Lubab teistel kasutada ruuterit DNS serverina (LAN klientidele)"},
    {term:"/system ntp client",def:"NTP aeg. set enabled=yes servers=pool.ntp.org"},
    {term:"/system clock",def:"Kella ja ajavööndi seaded"},
    {term:"/log print",def:"Näitab süsteemi loge. Kasulik vigade otsimisel."},
    {term:"/system resource print",def:"CPU, RAM, uptime, RouterOS versioon"},
    {term:"/system routerboard print",def:"Riistvara info, firmware versioon"},
    {term:"/ip service",def:"Teenuste haldus. Turva pärast keela mittevajalikud!"},
  ]},
  {id:"commands",title:"⌨️ CLI Käsud",color:"#1E3A5F",items:[
    {term:"/ping x.x.x.x",def:"Ping – kontrolli ühendust IP aadressiga"},
    {term:"/tool traceroute",def:"Traceroute – näita marsruuti sihtkohani"},
    {term:"/interface print",def:"Kõik liidesed ja nende olek (R=running, D=disabled)"},
    {term:"/ip address print",def:"Kõik IP aadressid liidestel"},
    {term:"/ip route print",def:"Marsruutimistabel"},
    {term:"/ip arp print",def:"ARP tabel – IP↔MAC seosed"},
    {term:"/ip firewall filter print",def:"Tulemüüri reeglid numbrite ja statistikaga"},
    {term:"? (küsimärk)",def:"Näitab saadaolevaid käske ja parameetreid igal tasandil – väga kasulik!"},
    {term:"Tab",def:"Automaatlõpetamine CLI-s"},
    {term:"/export",def:"Ekspordib konfiguratsiooni tekstina. Salvesta backup!"},
    {term:"/system backup save",def:"Salvestab binaarset backupi"},
  ]},
  {id:"ports",title:"🔌 Vaikimisi Pordid",color:"#2C3E50",items:[
    {term:"Winbox",def:"TCP 8291"},
    {term:"SSH",def:"TCP 22"},
    {term:"Telnet",def:"TCP 23 (ebaturvaline!)"},
    {term:"HTTP (WebFig)",def:"TCP 80"},
    {term:"HTTPS",def:"TCP 443"},
    {term:"FTP",def:"TCP 21"},
    {term:"API",def:"TCP 8728"},
    {term:"API-SSL",def:"TCP 8729"},
    {term:"OpenVPN",def:"UDP/TCP 1194"},
    {term:"L2TP",def:"UDP 1701"},
    {term:"PPTP",def:"TCP 1723"},
  ]},
  {id:"devices",title:"🖧 Seadmed & Terminid",color:"#4A4E69",items:[
    {term:"RouterOS",def:"MikroTiku operatsioonisüsteem. Töötab kõigil MikroTiku seadmetel."},
    {term:"RouterBoard (RB)",def:"MikroTiku oma riistvara (nt RB951Ui-2HnD, RB750Gr3)"},

    {term:"wAP",def:"Wireless Access Point – välised/seinapeal WiFi AP-d"},

];

let activeCat = "all";

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const content = document.getElementById("content");

  const filtered = DATA
    .filter(cat => activeCat === "all" || cat.id === activeCat)
    .map(cat => ({
      ...cat,
      items: cat.items.filter(item =>
        item.term.toLowerCase().includes(q) || item.def.toLowerCase().includes(q)
      )
    }))
    .filter(cat => cat.items.length > 0);

  if (!filtered.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">¯\\_(ツ)_/¯</div><div>Terminit ei leitud: "${q}"</div></div>`;
    return;
  }

  content.innerHTML = filtered.map(cat => `
    <div class="section">
      <div class="sec-header" style="border-bottom:2px solid ${cat.color}">
        <span class="sec-title">${cat.title}</span>
        <span class="sec-count" style="background:${cat.color}33;color:${cat.color}">${cat.items.length} terminit</span>
      </div>
      <div class="items">
        ${cat.items.map(item => `
          <div class="item" style="border-left:3px solid ${cat.color}">
            <div class="term" style="color:${cat.id === 'commands' || cat.color === '#1E3A5F' ? '#7DD3FC' : cat.color}">${item.term}</div>
            <div class="def">${item.def}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("") + `<div id="tip"><span style="color:#7DD3FC">[TIP]</span> CLI-s kirjuta <span style="color:#A3E635">?</span> – näed kõiki saadaolevaid käske igal tasandil.</div>`;
}

function buildCats() {
  const cats = document.getElementById("cats");
  cats.innerHTML = `<button class="cat-btn active" style="background:#CC2936;color:#fff" onclick="setCat('all',this)">Kõik</button>` +
    DATA.map(cat => `<button class="cat-btn" onclick="setCat('${cat.id}',this)">${cat.title.split(" ").slice(1).join(" ")}</button>`).join("");
}

function setCat(id, btn) {
  activeCat = id;
  document.querySelectorAll(".cat-btn").forEach(b => {
    b.classList.remove("active");
    b.style.background = "#1E1E30";
    b.style.color = "#64748B";
  });
  btn.classList.add("active");
  const cat = DATA.find(c => c.id === id);
  btn.style.background = id === "all" ? "#CC2936" : cat.color;
  btn.style.color = "#fff";
  render();
}

// PWA install
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.add("show");
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; hideBanner(); });
  }
}
function hideBanner() {
  document.getElementById("install-banner").classList.remove("show");
}

// Service Worker for offline
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "mikrotik-v1";
    const FILES = [location.href];
    self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(FILES))));
    self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], {type: "application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

buildCats();
render();
</script>
</body>
</html>
